services:
  # Qdrant Vector Database for RAG
  qdrant:
    profiles:
      - embed
    image: qdrant/qdrant:latest
    container_name: llama-nexus-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: [ "CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis for event-driven architecture and caching
  redis:
    image: redis:7-alpine
    container_name: llama-nexus-redis
    ports:
      # Host 6382: avoid conflicts with other local Redis stacks on 6379/6381
      - "6382:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend Management API - Controls LlamaCPP
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llamacpp-backend
    ports:
      - "8700:8700" # Management API port
    environment:
      # Default LlamaCPP configuration - Qwen3.6-27B
      - MODEL_NAME=Qwen3.6-27B
      - MODEL_VARIANT=Q6_K
      - MODEL_REPO=unsloth/Qwen3.6-27B-GGUF
      # Host path for chat templates so backend can mount it into the managed container
      - TEMPLATES_HOST_DIR=${PWD}/chat-templates
      - CONTEXT_SIZE=256000
      - GPU_LAYERS=999
      - TEMPERATURE=0.15
      - TOP_P=0.95
      - TOP_K=0
      - MIN_P=0.02
      - REPEAT_PENALTY=1
      - REPEAT_LAST_N=64
      - FREQUENCY_PENALTY=0
      - PRESENCE_PENALTY=0
      # DRY off by default — omit from deploy command unless explicitly set in UI
      - DRY_MULTIPLIER=0.0
      - DRY_ALLOWED_LENGTH=2
      - DRY_PENALTY_LAST_N=0
      - BATCH_SIZE=1024
      - UBATCH_SIZE=512
      - THREADS=44
      - NUM_PREDICT=16000
      - NUM_KEEP=256
      - PARALLEL_SLOTS=1
      - SPLIT_MODE=layer
      - MAIN_GPU=0
      - CACHE_TYPE_K=q8_0
      - CACHE_TYPE_V=q8_0
      - N_CPU_MOE=0
      - API_KEY=${API_KEY:-placeholder-api-key}
      - TEMPLATE_PATH=/home/llamacpp/chat-template.jinja
      # Docker socket + compose project root (read-only mount at this path)
      - PROJECT_DIR=/home/alec/git/llama-nexus
      - USE_DOCKER=true
      - RUNNING_IN_DOCKER=true
      - LLAMACPP_CONTAINER_NAME=llamacpp-api
      # Must match the named Docker network (see bottom of this file; override if COMPOSE_PROJECT_NAME differs)
      - DOCKER_NETWORK=${DOCKER_NETWORK:-llama-nexus_default}
      # Inference image: same tag as `llamacpp-api` service `image:` below (Deploy UI / SDK starts this image)
      - LLAMACPP_DOCKER_IMAGE=${LLAMACPP_DOCKER_IMAGE:-llama-nexus-llamacpp-api:latest}
      # Optional; if unset, derived from DOCKER_NETWORK as {project}_gpt_oss_models
      - LLAMACPP_MODELS_VOLUME=${LLAMACPP_MODELS_VOLUME:-}
      - CUDA_DEVICES=0,1
      - TENSOR_SPLIT=1,1
      # Pass through HuggingFace token from host environment
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      # Enable colored logging
      - FORCE_COLOR=1
      - TERM=xterm-256color
      # Redis for event bus and caching
      - REDIS_URL=redis://redis:6379/0
      # Qdrant for RAG vector storage
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # Fine-tuning configuration
      - USE_DOCKER_TRAINING=true
      - TRAINING_IMAGE=llama-nexus-training:latest
      - HF_HOME=/root/.cache/huggingface
      - FINETUNE_DATASET_DIR=/data/finetune_datasets
      - FINETUNE_JOB_DIR=/data/finetune_jobs
      # GraphRAG integrated module (use with --profile graphrag)
      - GRAPHRAG_ENABLED=${GRAPHRAG_ENABLED:-false}
      - GRAPHRAG_URL=${GRAPHRAG_URL:-}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      # GraphRAG GPU services (opt-in, use respective profiles)
      - NER_API_URL=${NER_API_URL:-}
      - REL_API_URL=${REL_API_URL:-}
      - CODE_RAG_URL=${CODE_RAG_URL:-}
      # Database paths for persistent storage
      - TOKEN_DB_PATH=/data/token_usage.db
      - CONVERSATION_DB_PATH=/data/conversations.db
      - RAG_DB_PATH=/data/rag
      # Reddit Crawler Configuration
      - REDDIT_CRAWLER_ENABLED=true
      - REDDIT_CRAWLER_INTERVAL_HOURS=6
      - REDDIT_CRAWLER_MAX_PER_RUN=50
      - REDDIT_CRAWLER_SUBREDDITS=tifu,offmychest,AmItheAsshole,confession,relationship_advice,pettyrevenge,MaliciousCompliance
      # VLM (Vision-Language Model) Configuration for PDF visual description
      - VLM_ENDPOINT_URL=${VLM_ENDPOINT_URL:-http://llamacpp-api:8080/v1}
      - VLM_API_KEY=${VLM_API_KEY:-placeholder-api-key}
      - VLM_MODEL_NAME=${VLM_MODEL_NAME:-Qwen_Qwen3-VL-4B-Thinking}
      - VLM_ENABLED=${VLM_ENABLED:-true}
      - USE_DEPLOYED_EMBEDDINGS=true
      - EMBEDDING_SERVICE_API_KEY=${EMBEDDING_SERVICE_API_KEY:-llamacpp-embed}
      - DEFAULT_EMBEDDING_MODEL=nomic-embed-text-v1.5
    volumes:
      - backend_data:/data
      - gpt_oss_models:/home/llamacpp/models
      - ./chat-templates:/home/llamacpp/templates:ro
      # Mount llamacpp binaries
      - llamacpp_bin:/usr/local/bin:ro
      # Mount Docker socket to enable Docker operations
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount entire project directory for rebuild operations (read-only except Dockerfile)
      - .:/home/alec/git/llama-nexus:ro
      # Mount Dockerfile separately as read-write for version management
      - ./Dockerfile:/home/alec/git/llama-nexus/Dockerfile
      - ./Dockerfile.vllm:/home/alec/git/llama-nexus/Dockerfile.vllm
      # Conversation storage
      - conversation_data:/data/conversations
    shm_size: '16gb'
    # GPU access for local embedding models (sentence-transformers)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      llamacpp-builder:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Build container for LlamaCPP binaries
  llamacpp-builder:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        SKIP_BUILD_FROM_SOURCE: "false"
        LLAMACPP_VERSION: "b9193"
        LLAMACPP_BUILD_TAG: "b9193"
        LLAMA_CPP_REF: "b9193"
        ENABLE_TURBOQUANT: "false"
        CMAKE_BUILD_JOBS: ${CMAKE_BUILD_JOBS:-2}
        CUDA_ARCH: ${CUDA_ARCH:-86}
    container_name: llamacpp-builder
    volumes:
      - llamacpp_bin:/output
    command: |
      bash -c "
        cp /build/llama.cpp/build/bin/llama-server /output/
        cp /build/llama.cpp/build/bin/llama-cli /output/
        chmod +x /output/*
        echo 'LlamaCPP binaries copied'
      "

  # Llama.cpp API Server - Direct access
  llamacpp-api:
    profiles:
      - extra
    image: ${LLAMACPP_DOCKER_IMAGE:-llama-nexus-llamacpp-api:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_TURBOQUANT: "false"
        ENABLE_LLGUIDANCE: ${ENABLE_LLGUIDANCE:-false}
        CMAKE_BUILD_JOBS: ${CMAKE_BUILD_JOBS:-2}
        CUDA_ARCH: ${CUDA_ARCH:-86}
        LLAMA_CPP_REF: "b9193"
        LLAMACPP_BUILD_TAG: "b9193"
        LLAMACPP_VERSION: "b9193"
    container_name: llamacpp-api
    hostname: llamacpp
    ports:
      - "8600:8080" # API server port
    shm_size: '16gb'
    runtime: nvidia
    volumes:
      - gpt_oss_models:/home/llamacpp/models
      - ./chat-templates:/home/llamacpp/templates:ro
    environment:
      - TEMPLATE_DIR=/home/llamacpp/templates
      # Empty = use chat template embedded in the GGUF
      - CHAT_TEMPLATE=
      # CUDA optimizations - Qwen3.6-27B Q6_K is split across two GPUs
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0,2}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0,2}
      # Model configuration - Qwen3.6-27B
      - MODEL_NAME=Qwen3.6-27B
      - MODEL_VARIANT=Q6_K
      - MODEL_REPO=unsloth/Qwen3.6-27B-GGUF
      - CONTEXT_SIZE=256000
      # Disable aggressive DRY + freq/presence penalties that caused intermittent empty replies.
      - DRY_MULTIPLIER=0.0
      - DRY_ALLOWED_LENGTH=2
      - DRY_PENALTY_LAST_N=0
      - FREQUENCY_PENALTY=0.0
      - PRESENCE_PENALTY=0.0
      - MIN_P=0.0
      - GPU_LAYERS=999
      - TEMPERATURE=0.15
      - TOP_P=0.95
      - TOP_K=0
      - MIN_P=0.02
      - API_KEY=${API_KEY:-placeholder-api-key}
      - BATCH_SIZE=1024
      - UBATCH_SIZE=512
      - THREADS=44
      - NUM_PREDICT=16000
      - NUM_KEEP=256
      - PARALLEL_SLOTS=1
      - SPLIT_MODE=layer
      - MAIN_GPU=0
      - CACHE_TYPE_K=q8_0
      - CACHE_TYPE_V=q8_0
      - N_CPU_MOE=0
      # MTP (Multi-Token Prediction) — opt-in; requires MTP-converted GGUF + image b9193+
      - MTP_ENABLED=${MTP_ENABLED:-false}
      - MTP_DRAFT_N_MAX=${MTP_DRAFT_N_MAX:-3}
      - MTP_DRAFT_N_MIN=${MTP_DRAFT_N_MIN:-0}
      - MTP_DRAFT_P_MIN=${MTP_DRAFT_P_MIN:-0.75}
      # HuggingFace token for downloads
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  # Management Frontend - React Web Interface
  llamacpp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llamacpp-frontend
    hostname: frontend
    ports:
      - "3002:80" # Frontend web interface
    depends_on:
      - backend-api
      # llamacpp-api dependency removed - GPU may not always be available
    environment:
      - VITE_API_BASE_URL=
      - VITE_BACKEND_URL=
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # vLLM API Server - Nemotron-3-Nano-Omni multimodal (text, image, video, audio)
  vllm-api:
    profiles:
      - vllm
    build:
      context: .
      dockerfile: Dockerfile.vllm
    container_name: vllm-api
    hostname: vllm
    ports:
      - "${VLLM_PUBLISHED_PORT:-8601}:${PORT:-8080}"
    shm_size: '16gb'
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ 'all' ]
              capabilities: [ gpu ]
    environment:
      # Values substituted from the host env at `docker compose` time.
      # The backend merges Deploy / VLLMManager.config here when starting or rebuilding vLLM.
      - MODEL_NAME=${MODEL_NAME:-nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4}
      - SERVED_MODEL_NAME=${SERVED_MODEL_NAME:-Nemotron-3-Nano-Omni-30B-A3B-Reasoning}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8080}
      - API_KEY=${API_KEY:-placeholder-api-key}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-16384}
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION:-0.95}
      - TENSOR_PARALLEL_SIZE=${TENSOR_PARALLEL_SIZE:-1}
      - PIPELINE_PARALLEL_SIZE=${PIPELINE_PARALLEL_SIZE:-1}
      - DATA_PARALLEL_SIZE=${DATA_PARALLEL_SIZE:-1}
      - KV_CACHE_DTYPE=${KV_CACHE_DTYPE:-fp8}
      - REASONING_PARSER=${REASONING_PARSER:-nemotron_v3}
      - REASONING_PARSER_PLUGIN=${REASONING_PARSER_PLUGIN:-}
      - TOOL_CALL_PARSER=${TOOL_CALL_PARSER:-qwen3_coder}
      - VIDEO_PRUNING_RATE=${VIDEO_PRUNING_RATE:-0.5}
      - VIDEO_FPS=${VIDEO_FPS:-2}
      - VIDEO_NUM_FRAMES=${VIDEO_NUM_FRAMES:-256}
      - MAX_NUM_SEQS=${MAX_NUM_SEQS:-16}
      - MAX_NUM_BATCHED_TOKENS=${MAX_NUM_BATCHED_TOKENS:-8192}
      - VLLM_DTYPE=${VLLM_DTYPE:-auto}
      - VLLM_QUANTIZATION=${VLLM_QUANTIZATION:-}
      - MOE_BACKEND=${MOE_BACKEND:-}
      - MAMBA_SSM_CACHE_DTYPE=${MAMBA_SSM_CACHE_DTYPE:-}
      - VLLM_ENFORCE_EAGER=${VLLM_ENFORCE_EAGER:-true}
      - VLLM_ENABLE_CHUNKED_PREFILL=${VLLM_ENABLE_CHUNKED_PREFILL:-true}
      - VLLM_ASYNC_SCHEDULING=${VLLM_ASYNC_SCHEDULING:-true}
      - TRUST_REMOTE_CODE=${TRUST_REMOTE_CODE:-true}
      - VLLM_ENABLE_AUTO_TOOL_CHOICE=${VLLM_ENABLE_AUTO_TOOL_CHOICE:-true}
      - VLLM_SPECULATIVE_CONFIG=${VLLM_SPECULATIVE_CONFIG:-}
      - VLLM_NVFP4_GEMM_BACKEND=${VLLM_NVFP4_GEMM_BACKEND:-marlin}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-1}
      - VLLM_FLASHINFER_ALLREDUCE_BACKEND=${VLLM_FLASHINFER_ALLREDUCE_BACKEND:-trtllm}
      - VLLM_USE_FLASHINFER_MOE_FP4=${VLLM_USE_FLASHINFER_MOE_FP4:-0}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
    volumes:
      - vllm_models:/home/vllm/models
      - vllm_cache:/home/vllm/.cache
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  # Llama.cpp Embedding Server - Optional RAG Embedding Service
  llamacpp-embed:
    profiles:
      - embed
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_ARCH: ${CUDA_ARCH:-86}
    container_name: llamacpp-embed
    hostname: llamacpp-embed
    ports:
      - "8602:8080" # Embedding server port
    shm_size: '8gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1  # Use count: 1 to respect CUDA_VISIBLE_DEVICES for GPU pinning
              capabilities: [ gpu ]
    volumes:
      - gpt_oss_models:/home/llamacpp/models
      - ./scripts/start-embed.sh:/start-embed.sh:ro
    environment:
      # Embedding model configuration - Nomic Embed v1.5
      - MODEL_NAME=nomic-embed-text-v1.5
      - MODEL_VARIANT=Q8_0
      - MODEL_REPO=nomic-ai/nomic-embed-text-v1.5-GGUF
      - MODEL_FILE=nomic-embed-text-v1.5.Q8_0.gguf
      - CONTEXT_SIZE=8192
      - GPU_LAYERS=999
      - HOST=0.0.0.0
      - PORT=8080
      - API_KEY=${EMBEDDING_SERVICE_API_KEY:-llamacpp-embed}
      - THREADS=8
      - BATCH_SIZE=1024
      - UBATCH_SIZE=1024
      - POOLING_TYPE=mean
      - PARALLEL=8
      # HuggingFace token for downloads
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      # GPU device pinning - NVIDIA_VISIBLE_DEVICES is respected by Docker runtime
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - NVIDIA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    entrypoint: [ "/bin/bash", "/start-embed.sh" ]

  training:
    profiles:
      - training  
    build:
      context: ./backend
      dockerfile: Dockerfile.training
    container_name: llama-nexus-training
    # GPU reservations for QLoRA training (requires sm_70+ GPU)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ 'all' ]
              capabilities: [ gpu ]
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - REDIS_URL=redis://redis:6379/0
      - FINETUNE_DATASET_DIR=/data/finetune_datasets
      - FINETUNE_JOB_DIR=/data/finetune_jobs
      - HF_HOME=/root/.cache/huggingface
      # Set to false to enable GPU training with QLoRA (requires compatible GPU)
      - FORCE_CPU_TRAINING=false
    volumes:
      # Share the backend data volume for job configs and datasets
      - backend_data:/data
      # HuggingFace model cache
      - huggingface_cache:/root/.cache/huggingface
      # Models directory for saving merged models
      - gpt_oss_models:/home/llamacpp/models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Quantization Worker - Model Quantization Service
  quantization-worker:
    profiles:
      - quantize
    build:
      context: ./backend
      dockerfile: Dockerfile.quantization
    container_name: quantization-worker
    hostname: quantization-worker
    shm_size: '16gb'
    runtime: nvidia
    volumes:
      - gpt_oss_models:/home/llamacpp/models
      - backend_data:/data
      - quantization_output:/app/quantization_output
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODELS_DIR=/home/llamacpp/models
      - QUANTIZATION_OUTPUT_DIR=/app/quantization_output
      - QUANTIZATION_DB_PATH=/data/quantization.db
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python3", "-c", "import redis; redis.from_url('redis://redis:6379/0').ping()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # LM-Eval Worker - API-backed model evaluation (no local GPU needed)
  lm-eval-worker:
    profiles:
      - eval
    build:
      context: ./backend
      dockerfile: Dockerfile.lm-eval
    container_name: lm-eval-worker
    hostname: lm-eval-worker
    volumes:
      - backend_data:/data
      - gpt_oss_models:/home/llamacpp/models:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LM_EVAL_OUTPUT_DIR=/data/lm_eval_results
      - LLAMACPP_API_URL=http://llamacpp-api:8080
      - LM_EVAL_API_KEY=placeholder-api-key
      - MODEL_PATH=/home/llamacpp/models/Qwen3.6-27B-Q6_K.gguf
      - CUDA_VISIBLE_DEVICES=1,3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python3", "-c", "import redis; redis.from_url('redis://redis:6379/0').ping()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Terminal-Bench Worker - Harbor-based agentic benchmark runner
  terminal-bench-worker:
    profiles:
      - eval
    build:
      context: ./backend
      dockerfile: Dockerfile.terminal-bench
    container_name: terminal-bench-worker
    hostname: terminal-bench-worker
    shm_size: '16gb'
    command: [ "python3", "/app/lm_eval_worker.py" ]
    volumes:
      - backend_data:/data
      - huggingface_cache:/root/.cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
    environment:
      - WORKER_MODE=terminal_bench
      - REDIS_URL=redis://redis:6379/0
      - TERMINAL_BENCH_OUTPUT_DIR=/data/terminal_bench_results
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-all}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - LLAMACPP_API_URL=http://llamacpp-api:8080
      - OPENAI_API_KEY=placeholder-api-key
      - OPENAI_BASE_URL=http://llamacpp-api:8080/v1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
      backend-api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python3", "-c", "import redis; redis.from_url('redis://redis:6379/0').ping()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Training image builder (run with: docker compose build training-image)
  training-image:
    build:
      context: ./backend
      dockerfile: Dockerfile.training
    image: llama-nexus-training:latest
    profiles:
      - build-only # Only build, don't run as a service
    command: [ "echo", "Training image built successfully" ]

  # =============================================================
  # STREAMING STT: NVIDIA Nemotron Speech Streaming
  # Real-time speech-to-text with cache-aware streaming inference
  # Start with: docker compose --profile streaming-stt up -d streaming-stt
  # =============================================================
  streaming-stt:
    profiles:
      - streaming-stt 
    build:
      context: ./streaming-stt
      dockerfile: Dockerfile
    container_name: streaming-stt
    ports:
      - "8609:8009"
    # NVIDIA NeMo Framework requires these settings for proper SHMEM allocation
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      # The NeMo model to use for streaming STT
      - MODEL_NAME=${STREAMING_STT_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b}
      # Audio chunk size sent from frontend (ms). Keep at 80ms for optimal latency
      - CHUNK_SIZE_MS=${STREAMING_STT_CHUNK_MS:-80}
      # Audio sample rate (Hz). Model expects 16kHz
      - SAMPLE_RATE=${STREAMING_STT_SAMPLE_RATE:-16000}
      # RMS level to detect speech start. Lower = more sensitive to quiet speech
      - VAD_THRESHOLD=${STT_VAD_THRESHOLD:-0.005}
      # RMS level to detect silence. Lower = more tolerant of quiet pauses
      - VAD_SILENCE_THRESHOLD=${STT_VAD_SILENCE_THRESHOLD:-0.005}
      # Debounce time for speech/silence transitions
      - VAD_HYSTERESIS_MS=${STT_VAD_HYSTERESIS_MS:-100}
      # Silence duration (ms) before pending text is committed as a sentence
      - SENTENCE_END_SILENCE_MS=${STT_SENTENCE_END_SILENCE_MS:-800}
      # Minimum word count for text to be committed as a sentence
      - MIN_SENTENCE_WORDS=${STT_MIN_SENTENCE_WORDS:-2}
      # Audio buffer before model inference (~900ms optimal for NeMo)
      - MODEL_BUFFER_MS=${STT_MODEL_BUFFER_MS:-896}
      # Logging level (DEBUG, INFO, WARNING, ERROR)
      - LOG_LEVEL=${STT_LOG_LEVEL:-INFO}
      - NVIDIA_VISIBLE_DEVICES=all
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8009/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s # NeMo model loading takes time
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

  # ========================================
  # GraphRAG: Neo4j Knowledge Graph (optional)
  # Start with: docker compose --profile graphrag up -d
  # ========================================
  neo4j:
    profiles:
      - graphrag  
    image: neo4j:5.11
    container_name: llama-nexus-neo4j
    ports:
      - "7474:7474"  # HTTP Browser
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ========================================
  # GraphRAG NER Service (GLiNER entity extraction)
  # Opt-in: Start with docker compose --profile graphrag-ner up -d
  # ========================================
  graphrag-ner:
    profiles:
      - graphrag
    build:
      context: ./services/ner_api
      dockerfile: Dockerfile
    container_name: llama-nexus-ner
    ports:
      - "8711:8001"
    environment:
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/transformers
      - CUDA_VISIBLE_DEVICES=  # Force CPU-only mode
    volumes:
      - ner_cache:/app/.cache
      - ner_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # ========================================
  # GraphRAG Relationship Extraction Service
  # Opt-in: Start with docker compose --profile graphrag-rel up -d
  # ========================================
  graphrag-rel:
    profiles:
      - graphrag-rel
    build:
      context: ./services/rel_api
      dockerfile: Dockerfile
    container_name: llama-nexus-rel
    ports:
      - "8712:8002"
    environment:
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/transformers
      - CUDA_VISIBLE_DEVICES=  # Force CPU-only mode
    volumes:
      - rel_cache:/app/.cache
      - rel_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # ========================================
  # GraphRAG Code-RAG Service (code detection/search)
  # Opt-in: Start with docker compose --profile graphrag-code up -d
  # ========================================
  graphrag-code:
    profiles:
      - graphrag
    build:
      context: ./services/code_rag
      dockerfile: Dockerfile
    container_name: llama-nexus-code-rag
    ports:
      - "8713:8000"
    environment:
      - HF_HOME=/app/.cache/huggingface
      - GRAPHRAG_API_URL=http://backend-api:8700
    volumes:
      - code_rag_cache:/app/.cache
      - code_rag_models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

volumes:
  gpt_oss_models:
    driver: local
  llamacpp_bin:
    driver: local
  finetune_data:
    driver: local
  vllm_models:
    driver: local
  vllm_cache:
    driver: local
  conversation_data:
    driver: local
  redis_data:
    driver: local
  backend_data:
    driver: local
  qdrant_data:
    driver: local
  quantization_output:
    driver: local
  huggingface_cache:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  # GraphRAG service volumes
  ner_cache:
    driver: local
  ner_models:
    driver: local
  rel_cache:
    driver: local
  rel_models:
    driver: local
  code_rag_cache:
    driver: local
  code_rag_models:
    driver: local

# Explicitly name the default network so external stacks (e.g. graphrag)
# can reference it to access shared services like llamacpp-embed
networks:
  default:
    name: llama-nexus_default
